---
devices:
  samplerate: 48000
  chunksize: 1024
  target_level: 512
  enable_rate_adjust: true
  capture:
    type: CoreAudio
    channels: 2
    device: "BlackHole 2ch"
  playback:
    type: CoreAudio
    channels: 2
    device: "DSP Aggregate"
    exclusive: false

filters:
  eq_band_01: { type: Biquad, parameters: { type: Peaking, freq: 31, gain: 0.0, q: 1.0 } }
  eq_band_02: { type: Biquad, parameters: { type: Peaking, freq: 62, gain: 0.0, q: 1.0 } }
  eq_band_03: { type: Biquad, parameters: { type: Peaking, freq: 125, gain: 0.0, q: 1.0 } }
  eq_band_04: { type: Biquad, parameters: { type: Peaking, freq: 250, gain: 0.0, q: 1.0 } }
  eq_band_05: { type: Biquad, parameters: { type: Peaking, freq: 500, gain: 0.0, q: 1.0 } }
  eq_band_06: { type: Biquad, parameters: { type: Peaking, freq: 1000, gain: 0.0, q: 1.0 } }
  eq_band_07: { type: Biquad, parameters: { type: Peaking, freq: 2000, gain: 0.0, q: 1.0 } }
  eq_band_08: { type: Biquad, parameters: { type: Peaking, freq: 4000, gain: 0.0, q: 1.0 } }
  eq_band_09: { type: Biquad, parameters: { type: Peaking, freq: 8000, gain: 0.0, q: 1.0 } }
  eq_band_10: { type: Biquad, parameters: { type: Peaking, freq: 16000, gain: 0.0, q: 1.0 } }
  limiter:
    type: Limiter
    parameters: { soft_clip: false, clip_limit: -1.0 }
  convolution_placeholder:
    type: Conv
    parameters:
      type: Wav
      filename: "dsp/irs/vocal_plate.wav"
      channel: 0
processors:
  compressor_main:
    type: Compressor
    parameters:
      channels: 2
      attack: 0.01
      release: 0.10
      threshold: -18.0
      factor: 2.5
      makeup_gain: 0.0
      monitor_channels: [0, 1]
      process_channels: [0, 1]

pipeline:
  - type: Filter
    channels: [0, 1]
    names: [eq_band_01, eq_band_02, eq_band_03, eq_band_04, eq_band_05, eq_band_06, eq_band_07, eq_band_08, eq_band_09, eq_band_10]
  - type: Processor
    name: compressor_main
  - type: Filter
    channels: [0, 1]
    names: [limiter]
  - type: Filter
    channels: [0, 1]
    names: [convolution_placeholder]
